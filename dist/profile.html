<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coquette · Profile</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <!-- Google Fonts (Playfair + Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body{
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:2rem;

    background:
    radial-gradient(circle at top left,#ffeef3 0%,transparent 25%),
    radial-gradient(circle at bottom right,#fff2f6 0%,transparent 30%),
    linear-gradient(135deg,#fff7fa,#fdf1f6,#fffafc);
}

    .coquette-card{
    width:100%;
    max-width:1300px;

    background:rgba(255,255,255,.85);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.6);

    border-radius:35px;

    overflow:hidden;

    display:flex;

    box-shadow:

    0 30px 70px rgba(255,170,190,.25),

    0 10px 25px rgba(0,0,0,.05);

    position:relative;
}

    .sidebar-coquette {
      width: 240px;
      background:
        linear-gradient(180deg, #FFE8F1, #FEEAF2, #FFF4F8);
      padding: 2rem 1.2rem 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #eeddd5;
      flex-shrink: 0;
      position:relative;
      overflow:hidden;
    }
    .sidebar-coquette::before{
      content:"🎀";
      position:absolute;
      top:15px;
      right:18px;
      font-size:28px;
      opacity:.4;
      transform:rotate(-10deg);
    }

    .profile-header-side {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding-bottom: 1.8rem;
      border-bottom: 1px solid #e7d4cb;
      margin-bottom: 2rem;
    }

    .avatar-coquette {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #f5e0d8;
      background: #ebd5cc;
      box-shadow: 0 4px 10px rgba(160, 100, 90, 0.08);
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: #4d342e;
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .profile-name span {
      display: block;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 0.7rem;
      color: #8b6b60;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    .profile-name i {
      margin-right: 5px;
      font-size: 0.7rem;
      color: #b28475;
    }

    .menu-coquette a{
      border-radius:18px;
      padding:15px 18px;
      transition:.35s;
      font-weight:500;
    }
    .menu-coquette a:hover{
      background:#fff;
      transform:translateX(8px);
      box-shadow:0 10px 20px rgba(255,180,200,.25);
    }
    .menu-coquette a.active{
      background:white;
      box-shadow:0 12px 25px rgba(255,180,200,.35);
    }

    .menu-coquette a {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.65rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #4d342e;
      text-decoration: none;
      transition: all 0.2s ease;
      background: transparent;
      border: 1px solid transparent;
    }

    .menu-coquette a i {
      width: 1.4rem;
      font-size: 1rem;
      color: #8b6b60;
      transition: color 0.2s;
    }

    .menu-coquette a:hover {
      background: #fceee9;
      border-color: #e7cec4;
      color: #3f2a25;
    }

    .menu-coquette a:hover i {
      color: #b28475;
    }

    .menu-coquette a.active {
      background: #fce8e0;
      border-color: #dcbfb3;
      color: #3f2a25;
    }
    .menu-coquette a.active i {
      color: #b28475;
    }

    .main-coquette {
      flex: 1;
      padding: 2rem 2.5rem 2.5rem 2.5rem;
      background: #fffcf9;
      min-width: 280px;
    }

    .page-title{
      font-size:38px;
      font-family:"Playfair Display",serif;
      color:#C26B8A;
      position:relative;
      display:inline-block;
    }
    .page-title::after{
      content:"";
      position:absolute;
      left:0;
      bottom:-8px;
      width:90px;
      height:4px;
      border-radius:50px;
      background:#F6C4D5;
    }

    .page-sub {
      font-size: 0.85rem;
      color: #8d7268;
      margin-bottom: 1.8rem;
      border-left: 3px solid #e5cdc2;
      padding-left: 1rem;
      font-weight: 300;
    }

    hr.divider-coquette {
      border: none;
      height: 1px;
      background: linear-gradient(to right, #edd7cd, #f5e8e1, #fcf3ed);
      margin-bottom: 2rem;
    }

    .profile-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 2.2rem;
    }

    .form-col {
      flex: 2;
      min-width: 260px;
    }

    .photo-col {
      flex: 1;
      min-width: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #fdf6f2;
      padding: 1.2rem 0.8rem;
      border-radius: 1.5rem;
      border: 1px solid #f3e2da;
      position:relative;
    }
    .photo-col::before{
      content:"♡";
      position:absolute;
      top:18px;
      right:20px;
      font-size:30px;
      color:#f5b8cb;
    }

    .field-group {
      margin-bottom: 1.5rem;
    }

    .field-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #765e54;
      margin-bottom: 0.3rem;
    }

    .field-group .input-coquette {
      width: 100%;
      padding: 0.65rem 1.2rem;
      border: 1px solid #e8d5cc;
      border-radius: 40px;
      background: white;
      font-size: 0.95rem;
      color: #2f201c;
      transition: 0.2s;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    .field-group .input-coquette:focus {
      border-color: #dbb8ab;
      box-shadow: 0 0 0 3px #f7e4dc;
    }

    .input-coquette:focus{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(255,190,210,.35);
    }

    .input-coquette.bg-blush {
      background: #fceae3;
      border-color: #e7d0c5;
      color: #3f2a25;
      font-weight: 500;
    }

    .input-group-soft {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .input-group-soft .input-coquette {
      border-radius: 40px 0 0 40px;
      flex: 1;
    }

    .input-group-soft .btn-soft {
      background: white;
      border: 1px solid #e8d5cc;
      border-left: none;
      padding: 0.65rem 1.4rem;
      border-radius: 0 40px 40px 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: #765e54;
      transition: 0.2s;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.4px;
    }

    .input-group-soft .btn-soft:hover {
      background: #f7ede8;
      border-color: #dbb8ab;
      color: #4d342e;
    }

    .radio-coquette {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 1.8rem;
      margin-top: 0.2rem;
    }

    .radio-coquette label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: #4d342e;
      font-weight: 400;
      cursor: pointer;
    }

    .radio-coquette input[type="radio"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid #dcc0b5;
      border-radius: 50%;
      outline: none;
      transition: 0.15s;
      cursor: pointer;
      background: white;
      flex-shrink: 0;
    }

    .radio-coquette input[type="radio"]:checked {
      border-color: #b28475;
      background-color: #b28475;
      box-shadow: inset 0 0 0 4px white, 0 0 0 1px #b28475;
    }

    .select-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .select-row select {
      flex: 1 1 80px;
      padding: 0.65rem 0.5rem;
      border: 1px solid #e8d5cc;
      border-radius: 40px;
      background: white;
      font-size: 0.85rem;
      color: #2f201c;
      outline: none;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: 0.2s;
    }

    .select-row select:focus {
      border-color: #dbb8ab;
      box-shadow: 0 0 0 3px #f7e4dc;
    }

    .btn-save{
      background: linear-gradient(90deg, #F8A8C8, #F5BDD2);
      padding:15px 45px;
      font-size:15px;
      border-radius:50px;
      box-shadow:0 10px 25px rgba(255,170,200,.4);
      border: none;
      color: #4d342e;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-save:hover {
      background: #c7a498;
      transform: scale(0.97);
      box-shadow: 0 6px 16px rgba(180, 130, 120, 0.18);
    }

    .photo-col img{
      width:150px;
      height:150px;
      border-radius:50%;
      border:6px solid white;
      box-shadow:0 20px 40px rgba(255,180,210,.4);
      object-fit: cover;
    }

    .photo-col .btn-outline-coquette {
      background: transparent;
      border: 1px solid #dcc0b5;
      padding: 0.4rem 1.8rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #6b5248;
      transition: 0.2s;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      margin-top: 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .photo-col .btn-outline-coquette:hover {
      background: #f7ede8;
      border-color: #b58d7d;
      color: #3f2a25;
    }

    .photo-hint {
      font-size: 0.7rem;
      color: #a5877b;
      text-align: center;
      margin-top: 0.6rem;
      line-height: 1.5;
      background: #faf1ec;
      padding: 0.3rem 1rem;
      border-radius: 40px;
    }

    .photo-hint i {
      margin-right: 4px;
    }

    .coquette-icon {
      color: #d9b9ae;
      margin-right: 6px;
    }
    .flower{
      position:absolute;
      font-size:40px;
      opacity:.18;
      pointer-events:none;
    }
    .flower1{
      left:40px;
      top:30px;
    }
    .flower2{
      right:80px;
      bottom:50px;
    }
    .flower3{
      left:55%;
      top:40px;
      font-size:28px;
    }

    /* Hidden file input */
    #fileInput {
      display: none;
    }

    @media(max-width:992px){
      .coquette-card{
        flex-direction:column;
      }
      .sidebar-coquette{
        width:100%;
        border-right:none;
        border-bottom:1px solid #f0d6df;
      }
      .profile-layout{
        flex-direction:column-reverse;
      }
      .photo-col{
        width:100%;
      }
    }
    @media(max-width:576px){
      body{
        padding:10px;
      }
      .coquette-card{
        border-radius:20px;
      }
      .sidebar-coquette{
        padding:20px;
      }
      .main-coquette{
        padding:20px;
      }
      .page-title{
        font-size:28px;
      }
      .menu-coquette{
        gap:8px;
      }
      .menu-coquette a{
        font-size:14px;
        padding:12px;
      }
      .photo-col img{
        width:120px;
        height:120px;
      }
      .btn-save{
        width:100%;
      }
      .select-row{
        flex-direction:column;
      }
      .select-row select{
        width:100%;
      }
      .radio-coquette{
        flex-direction:column;
        gap:10px;
      }
    }

    @media (max-width: 820px) {
      .sidebar-coquette {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #eeddd5;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 1.2rem 1.5rem;
        align-items: center;
        gap: 0.6rem;
      }

      .profile-header-side {
        border-bottom: none;
        padding-bottom: 0;
        margin-bottom: 0;
        flex: 1 1 auto;
      }

      .menu-coquette {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.2rem;
        flex: 1 1 100%;
        justify-content: flex-start;
        margin-top: 0.4rem;
      }

      .menu-coquette a {
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
        border-radius: 40px;
        background: #fcf3ef;
      }

      .main-coquette {
        padding: 1.8rem 1.5rem;
      }

      .profile-layout {
        flex-direction: column;
        gap: 2rem;
      }

      .photo-col {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem 2rem;
        padding: 1.5rem 1rem;
        border-radius: 1.5rem;
      }

      .photo-col img {
        width: 96px;
        height: 96px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 0.8rem;
      }

      .coquette-card {
        border-radius: 1.5rem;
      }

      .main-coquette {
        padding: 1.2rem;
      }

      .page-title {
        font-size: 1.6rem;
      }

      .input-group-soft {
        flex-wrap: wrap;
      }

      .input-group-soft .input-coquette {
        border-radius: 40px;
        border-right: 1px solid #e8d5cc;
      }

      .input-group-soft .btn-soft {
        border-radius: 40px;
        border-left: 1px solid #e8d5cc;
        margin-top: 0.3rem;
        width: 100%;
        justify-content: center;
      }

      .radio-coquette {
        gap: 0.5rem 1.2rem;
      }

      .select-row select {
        flex: 1 1 70px;
      }
    }
  </style>
</head>
<body>
<div class="coquette-card">
  <div class="flower flower1">✿</div>
  <div class="flower flower2">❀</div>
  <div class="flower flower3">♡</div>

  <!-- SIDEBAR -->
  <aside class="sidebar-coquette">
    <div class="profile-header-side">
      <img src="/img/Giselle2.jpg" alt="profile" class="avatar-coquette" id="sidebarAvatar" />
      <div class="profile-name">
        Shin eun sho123
        <span><i class="fas fa-pen"></i> Edit Profile</span>
      </div>
    </div>
    <nav class="menu-coquette">
      <a href="#" class="active"><i class="fas fa-user"></i> Akun Saya</a>
      <a href="#"><i class="fas fa-shopping-bag"></i> Pesanan Saya</a>
      <a href="#"><i class="fas fa-ticket-alt"></i> Diskon Kupon</a>
      <a href="coba.html"><i class="fas fa-arrow-right-from-bracket"></i> Keluar</a>
    </nav>
    <div style="margin-top: auto; font-size: 0.7rem; color: #b59588; padding-top: 2rem; letter-spacing: 0.4px; opacity: 0.7;">
      <i class="fas fa-heart" style="color: #d9b9ae;"></i> shinyshop
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-coquette">
    <h1 class="page-title">Profile Saya</h1>
    <hr class="divider-coquette" />

    <div class="profile-layout">
      <!-- form -->
      <div class="form-col">
        <form>
          <div class="field-group">
            <label><i class="far fa-user-circle coquette-icon"></i>User Name</label>
            <input type="text" value="Shin eun soo123" class="input-coquette" readonly />
            <div style="font-size: 0.7rem; color: #a5877b; margin-top: 0.3rem; padding-left: 0.5rem;">
              <i class="fas fa-info-circle"></i> Username hanya dapat diubah satu (1) kali.
            </div>
          </div>

          <div class="field-group">
            <label><i class="far fa-address-card coquette-icon"></i>Nama</label>
            <input type="text" value="Shin eun soo" class="input-coquette bg-blush" />
          </div>

          <div class="field-group">
            <label><i class="far fa-envelope coquette-icon"></i>Email</label>
            <div class="input-group-soft">
              <input type="email" value="s*********@gmail.com" class="input-coquette" readonly />
              <button type="button" class="btn-soft">UBAH</button>
            </div>
          </div>

          <div class="field-group">
            <label><i class="fas fa-phone-alt coquette-icon"></i>No Telp</label>
            <div class="input-group-soft">
              <input type="text" value="**********67" class="input-coquette" readonly />
              <button type="button" class="btn-soft">UBAH</button>
            </div>
          </div>

          <div class="field-group">
            <label><i class="fas fa-venus-mars coquette-icon"></i>Jenis Kelamin</label>
            <div class="radio-coquette">
              <label><input type="radio" name="gender" /> Laki-laki</label>
              <label><input type="radio" name="gender" checked /> Perempuan</label>
              <label><input type="radio" name="gender" /> Lainnya</label>
            </div>
          </div>

          <div class="field-group">
            <label><i class="fas fa-cake-candles coquette-icon"></i>Tanggal Lahir</label>
            <div class="select-row">
              <select><option>Tanggal</option></select>
              <select><option>Bulan</option></select>
              <select><option>Tahun</option></select>
            </div>
          </div>

          <button type="submit" class="btn-save"><i class="fas fa-check" style="margin-right: 8px;"></i>Simpan</button>
        </form>
      </div>

      <!-- photo -->
      <div class="photo-col">
        <img src="/img/Giselle2.jpg" alt="profile" id="profileImage" />
        <button class="btn-outline-coquette" id="chooseImageBtn"><i class="fas fa-image"></i> Pilih Gambar</button>
        <div class="photo-hint">
          <i class="fas fa-file-image"></i> maks 1 MB · JPG, PNG
        </div>
        <!-- hidden file input -->
        <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" />
      </div>
    </div>
  </main>
</div>

<script>
  (function() {
    const fileInput = document.getElementById('fileInput');
    const chooseBtn = document.getElementById('chooseImageBtn');
    const profileImage = document.getElementById('profileImage');
    const sidebarAvatar = document.getElementById('sidebarAvatar');

    // Trigger file input when button is clicked
    chooseBtn.addEventListener('click', function(e) {
      e.preventDefault();
      fileInput.click();
    });

    // Handle file selection
    fileInput.addEventListener('change', function(e) {
      const file = this.files[0];
      if (!file) return;

      // Validate file type (optional but friendly)
      const validTypes = ['image/png', 'image/jpeg', 'image/jpg'];
      if (!validTypes.includes(file.type)) {
        alert('Hanya file JPG atau PNG yang diperbolehkan.');
        this.value = ''; // reset
        return;
      }

      // Validate file size (max 1MB)
      if (file.size > 1024 * 1024) {
        alert('Ukuran file maksimal 1 MB.');
        this.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(ev) {
        const dataUrl = ev.target.result;
        // Update main profile image
        profileImage.src = dataUrl;
        // Update sidebar avatar
        sidebarAvatar.src = dataUrl;
      };
      reader.readAsDataURL(file);
    });
  })();
</script>

</body>
</html>
